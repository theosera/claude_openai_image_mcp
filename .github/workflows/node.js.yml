name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Least privilege: the default GITHUB_TOKEN is read-only. No job needs write.
permissions:
  contents: read

# Cancel superseded runs on the same branch / PR to cut race + cost surface.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Third-party actions are pinned to a full 40-char commit SHA (+ trailing
      # version comment) so a re-tagged release can't swap the code under us.
      # Dependabot (.github/dependabot.yml) bumps the SHA + comment together.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v6.0.9
        # pnpm version is auto-detected from the package.json "packageManager" field.

      - name: Use Node.js 22
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: 22.x
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Dependency audit (advisory, non-blocking)
        # Supply-chain advisory. Surfaced as a CI warning but non-blocking; real
        # triage happens in the Dependabot PR.
        continue-on-error: true
        run: pnpm audit --audit-level moderate

      # oxlint first: a fast (Rust) correctness pass that fails the build in
      # milliseconds before the heavier ESLint / type / build / test steps.
      - run: pnpm run lint:ox
      - run: pnpm run format:check
      - run: pnpm run lint
      - run: pnpm run typecheck
      - run: pnpm run build
      - run: pnpm test
